AWSTemplateFormatVersion: '2010-09-09'
Description: 'NAT Gateway Module for Lab 1'

Parameters:
  ProjectName:
    Type: String
  PublicSubnetId:
    Type: String

Resources:
  NatEIP:
    Type: 'AWS::EC2::EIP'
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat-eip'

  NatGateway:
    Type: 'AWS::EC2::NatGateway'
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat-gw'

Outputs:
  NatGatewayId:
    Value: !Ref NatGateway
